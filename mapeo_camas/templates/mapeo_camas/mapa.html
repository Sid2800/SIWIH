{% extends 'core/base.html' %}
{% load static %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<div class="contenedor2">
  <div class="tituloFormulario" style="margin-bottom: 1.5rem;">
    <div class="tituloFormulario-texto">
      <i class="bi bi-hospital"></i>
      <h2 class="sin-margen" id="mapa-titulo-principal">{{ titulo }}</h2>
    </div>
    <div class="tituloFormulario-subrallado"></div>
  </div>

  <div class="mapa-acciones-superior">
    <div class="dt-buttons mapa-botones-acciones">
      <button type="button" class="dt-button" id="btn-iniciar-mapeo" title="Iniciar mapeo de camas">
        <i class="bi bi-play-circle boton-exportacion"></i>
      </button>
      <button type="button" class="dt-button" id="btn-copiar-camas" title="Copiar resumen visible">
        <i class="bi bi-clipboard boton-exportacion"></i>
      </button>
      <button type="button" class="dt-button" id="btn-imprimir-camas" title="Imprimir mapa">
        <i class="bi bi-printer boton-exportacion"></i>
      </button>
      <button type="button" class="dt-button" id="btn-historiales-camas" title="Ver historiales de camas" onclick="window.location.href='{% url 'mapeo_camas_historiales' %}'">
        <i class="bi bi-clock-history boton-exportacion"></i>
      </button>
      <button type="button" class="dt-button mapa-control-mapeo--oculto" id="btn-terminar-mapeo" title="Terminar mapeo">
        <i class="bi bi-check2-circle boton-exportacion"></i>
      </button>
      <button type="button" class="dt-button mapa-control-mapeo--oculto" id="btn-cancelar-mapeo" title="Cancelar mapeo">
        <i class="bi bi-x-octagon boton-exportacion"></i>
      </button>
      {% if request.user.is_superuser %}
      <button type="button" class="dt-button" id="btn-sincronizar-camas" title="Sincronizar camas con ingresos activos">
        <i class="bi bi-arrow-repeat boton-exportacion"></i>
      </button>
      {% endif %}
    </div>

    <div class="mapa-buscador">
      <label for="mapa-busqueda" class="mapa-buscador-label">Buscar:</label>
      <select id="mapa-tipo-busqueda" class="formularioCampo-select">
        <option value="todo">Todos</option>
        <option value="cama">Numero cama</option>
        <option value="paciente">Paciente</option>
        <option value="estado">Estado</option>
      </select>
      <input
        type="text"
        id="mapa-busqueda"
        class="formularioCampo-text"
        placeholder="Buscar..."
        autocomplete="off"
      >
      <button type="button" class="dt-button" id="btn-limpiar-busqueda" title="Limpiar busqueda">
        <i class="bi bi-x-circle boton-exportacion"></i>
      </button>
    </div>
  </div>

  <div id="mapa-servicios" class="mapa-grid-servicios"></div>

  <div id="mapa-pie-mapeo" class="mapa-pie-mapeo mapa-control-mapeo--oculto" style="margin-top:1.5rem;">
    <button type="button" class="dt-button" id="btn-terminar-mapeo-pie" title="Terminar mapeo">
      <i class="bi bi-check2-circle boton-exportacion"></i>
      <span style="margin-left:0.4rem;font-size:1.3rem;">Terminar mapeo</span>
    </button>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'mapeo_camas/scripts/mapaCamasAsignacion.js' %}"></script>
{% if request.user.is_superuser %}
<script>
document.addEventListener('DOMContentLoaded', function () {
  const btn = document.getElementById('btn-sincronizar-camas');
  if (!btn) return;

  btn.addEventListener('click', function () {
    Swal.fire({
      title: 'Sincronizar camas',
      text: 'Se crearán registros faltantes de asignación para ingresos activos con cama. ¿Continuar?',
      icon: 'question',
      showCancelButton: true,
      confirmButtonText: 'Sí, sincronizar',
      cancelButtonText: 'Cancelar',
    }).then(function (result) {
      if (!result.isConfirmed) return;

      btn.disabled = true;
      btn.querySelector('i').className = 'bi bi-hourglass-split boton-exportacion';

      fetch("{% url 'sincronizar-camas-superadmin' %}", {
        method: 'POST',
        headers: {
          'X-CSRFToken': '{{ csrf_token }}',
          'Content-Type': 'application/json',
        },
      })
      .then(function (res) { return res.json(); })
      .then(function (data) {
        if (data.success) {
          const msg = `Sincronizados: ${data.sincronizados} | Omitidos: ${data.omitidos}` +
            (data.errores && data.errores.length ? ` | Errores: ${data.errores.length}` : '');
          if (data.errores && data.errores.length) {
            toastr.warning(msg, 'Sincronización con advertencias');
          } else {
            toastr.success(msg, 'Sincronización exitosa');
          }
        } else {
          toastr.error(data.error || 'Error desconocido', 'Error al sincronizar');
        }
      })
      .catch(function () {
        toastr.error('No se pudo conectar con el servidor.', 'Error');
      })
      .finally(function () {
        btn.disabled = false;
        btn.querySelector('i').className = 'bi bi-arrow-repeat boton-exportacion';
      });
    });
  });
});
</script>
{% endif %}
<style>
  .mapa-acciones-superior {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .mapa-buscador {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .mapa-botones-acciones {
    display: flex;
    align-items: center;
    gap: 0.2rem;
    margin: 0;
    float: none;
  }

  .mapa-buscador-label {
    margin: 0;
    font-family: var(--fuenteTablaTitulo);
    font-size: 1.8rem;
    color: var(--colorTextoMenu);
  }

  #mapa-tipo-busqueda {
    min-width: 220px;
  }

  #mapa-busqueda {
    min-width: 220px;
    max-width: 320px;
  }

  .mapa-grid-servicios {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1rem;
  }

  .mapa-servicio-card {
    border: 1px solid #d9d9d9;
    border-radius: 10px;
    background: #fff;
    overflow: hidden;
    padding: 0;
  }

  .mapa-servicio-titulo {
    margin: 0;
    font-weight: 700;
    padding: 0.6rem 0.8rem;
    background: #f3f6fb;
    border-bottom: 1px solid #d9e3f5;
  }

  .mapa-sala {
    border: 1px solid #d9d9d9;
    border-radius: 10px;
    margin: 0.8rem;
    background: #fff;
    overflow: hidden;
    padding: 0;
  }

  .mapa-sala:last-child {
    margin-bottom: 0.8rem;
  }

  .mapa-sala-titulo {
    margin: 0;
    font-size: 1.3rem;
    padding: 0.55rem 0.75rem;
    background: #f8fafc;
    border-bottom: 1px solid #e2e8f0;
  }

  .mapa-cubiculo {
    margin: 0.65rem;
    border: 1px solid #d3deef;
    border-radius: 10px;
    overflow: hidden;
    background: #fff;
  }

  .mapa-cubiculo-titulo {
    margin: 0;
    font-size: 1.1rem;
    color: #334155;
    padding: 0.45rem 0.65rem;
    background: #f8fafc;
    border-bottom: 1px solid #e2e8f0;
  }

  .mapa-camas-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 0.55rem;
    padding: 0.6rem;
  }

  .mapa-cama {
    min-height: 70px;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    padding: 1.8rem 0.5rem 0.4rem;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }

  .mapa-cama-accion-rapida {
    position: absolute;
    top: 0.3rem;
    right: 0.3rem;
    border: 1px solid #cbd5e1;
    background: rgba(255, 255, 255, 0.92);
    color: #334155;
    border-radius: 999px;
    width: 2rem;
    height: 2rem;
    line-height: 1;
    padding: 0;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
    box-shadow: 0 1px 2px rgba(15, 23, 42, 0.12);
    transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease, transform 0.1s ease;
  }

  .mapa-cama-accion-rapida .boton-exportacion {
    font-size: 1.05rem;
    margin: 0;
  }

  .mapa-cama-accion-rapida:hover {
    background: #f8fafc;
    border-color: #94a3b8;
    color: #0f172a;
  }

  .mapa-cama-accion-rapida:active {
    transform: scale(0.96);
  }

  .mapa-cama-accion-rapida:focus-visible {
    outline: 2px solid #38bdf8;
    outline-offset: 1px;
  }

  .mapa-cama-accion-rapida:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .mapa-cama:hover {
    transform: translateY(-2px);
    box-shadow: 0 3px 10px rgba(15, 23, 42, 0.15);
  }

  .mapa-cama-numero {
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1.1;
  }

  .mapa-cama-estado,
  .mapa-cama-paciente {
    font-size: 1.15rem;
    margin-top: 0.2rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    width: 100%;
  }

  /* DNI del paciente: tono más tenue para distinguirlo del nombre */
  .mapa-cama-dni {
    font-size: 1.0rem;
    color: #64748b;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    width: 100%;
  }

  .mapa-cama--vacia,
  .mapa-cama--libre {
    background: #dcfce7;
    color: #166534;
  }

  .mapa-cama--ocupada {
    background: #fee2e2;
    color: #991b1b;
  }

  .mapa-cama--alta {
    background: #dbeafe;
    color: #1e40af;
  }

  .mapa-cama--fuera-servicio,
  .mapa-cama--mantenimiento {
    background: #fef3c7;
    color: #92400e;
  }

  .mapa-cama--consulta-externa {
    background: #cffafe;
    color: #155e75;
  }

  .mapa-cama--sin-asignacion {
    background: #e2e8f0;
    color: #334155;
  }

  .mapa-cama--mapeada {
    box-shadow: inset 0 0 0 2px #f59e0b;
    background-image: linear-gradient(135deg, rgba(245, 158, 11, 0.12), rgba(245, 158, 11, 0));
  }

  .mapa-control-mapeo--oculto {
    display: none;
  }

  .mapa-vacio {
    color: #64748b;
    margin: 0;
  }

  .modal-cama-limite {
    margin: 0.3rem 0 0;
    font-size: 0.95rem;
    color: #334155;
    font-weight: 600;
  }

  @media (max-width: 768px) {
    .mapa-buscador-label,
    #mapa-tipo-busqueda,
    #mapa-busqueda {
      width: 100%;
      min-width: 0;
    }

  }
</style>
{% endblock %}
